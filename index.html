<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTMKlik Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:Arial,sans-serif;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
height:100vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
grid-template-rows:50vh 50vh;
}
}
</style>
</head>

<body>

<div class="grid">

<iframe
src="https://rtmklik.rtm.gov.my/live/okey"
allowfullscreen>
</iframe>

<iframe
src="https://rtmklik.rtm.gov.my/live/sukan">
</iframe>

</div>

</body>
</html>
