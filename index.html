<!DOCTYPE html>
<html lang="ms">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
height:100vh;
overflow:hidden;
}

#viewer{
width:100%;
height:100vh;
border:none;
transition:.3s;
}

.stream{
padding:12px;
background:#111;
}

.stream #viewer{
height:calc(100vh - 24px);
border-radius:14px;
}

.control{
position:fixed;
top:12px;
right:12px;
z-index:1000;
}

button{
padding:10px 16px;
border:none;
border-radius:999px;
background:#222;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="control">
<button onclick="toggleStream()">
📺 Stream
</button>
</div>

<iframe
id="viewer"
src="https://www.rbtvplus18.hair/football.html"
allowfullscreen>
</iframe>

<script>

function toggleStream(){
document.body.classList.toggle(
"stream"
);
}

</script>

</body>

</html>
